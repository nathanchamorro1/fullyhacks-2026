name: sustainscan
description: Scan products, get a sustainability score, find greener alternatives.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Barcode scanning — wraps Google ML Kit (Android) / AVFoundation (iOS).
  mobile_scanner: ^5.2.3

  # HTTP for Open Food Facts + our own backend.
  http: ^1.2.2

  # Simple local persistence for points / streak / history. Good enough for demo.
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
